<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>项目信息 - 面向人机物融合的可成长智能化软件理论方法与关键技术</title>
    <meta name="author" content="面向人机物融合的可成长智能化软件理论方法与关键技术研究项目组">

    <style>
      :root{
        --bg:#f6f8fb;
        --card:#ffffff;
        --accent:#0b5fff;
        --muted:#65748b;
        --max-w:900px;
        --radius:10px;
        --gap:14px;
      }
      html,body{height:100%;margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",Arial,sans-serif;background:var(--bg);color:#1f2937}
      .wrap{max-width:var(--max-w);margin:32px auto;padding:20px}
      header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
      header h1{font-size:1.05rem;margin:0;color:#0f172a}
      header a.btn{background:var(--accent);color:#fff;padding:8px 12px;border-radius:8px;text-decoration:none;font-weight:600}
      .card{background:var(--card);padding:16px;border-radius:var(--radius);box-shadow:0 6px 16px rgba(15,23,42,0.05)}
      .year{font-weight:700;color:#0b3b91;margin-bottom:10px}
      .item{display:flex;gap:12px;align-items:flex-start}
      .item img{height:48px;border-radius:6px}
      .item .meta{font-size:0.95rem}
      .item .meta a{color:var(--accent);text-decoration:none;font-weight:600}
      .muted{color:var(--muted);font-size:0.95rem}
      @media (max-width:600px){.wrap{padding:12px}.item{flex-direction:row}}
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <h1>项目信息与公告</h1>
        <a class="btn" href="../index.html">返回主页</a>
      </header>

      <section class="card">
        <div class="year">2026</div>

        <article class="item">
          <img src="new.gif" style="height:20px;" alt="启动会">
          <div class="meta">
            <div style="margin-top:6px"><a href="202603/start.html">项目启动会议在南京大学召开</a></div>
            <div class="muted">2026.03.07</div>
          </div>
        </article>
      </section>
    </div>

    <script src="/assets/js/scripts.min.js"></script>
  </body>
</html>
